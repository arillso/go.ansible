---
linters:
    enable:
        - errcheck
        - govet
        - staticcheck
        - gosec
        - ineffassign
        - unused
        - misspell
        - gofmt
        - gosimple
        - gocritic

linters-settings:
    errcheck:
        check-blank: false
    govet:
        enable-all: true
    gosec:
        excludes:
            - G204 # subprocess launched with variable - expected for ansible execution
    gocritic:
        enabled-tags:
            - diagnostic
            - performance

issues:
    exclude-use-default: true
    max-issues-per-linter: 50
    max-same-issues: 5
