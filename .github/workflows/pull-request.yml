---
name: Pull Request
run-name: |
    Pull Request by @${{ github.actor }}

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    security-events: write
    actions: read
    pull-requests: write
    issues: read
    id-token: write

jobs:
    go:
        uses: arillso/.github/.github/workflows/ci-go.yml@2026-06-18

    lint:
        uses: arillso/.github/.github/workflows/ci-lint.yml@2026-06-18

    security-secrets:
        uses: arillso/.github/.github/workflows/security-secrets.yml@2026-06-18

    claude-review:
        uses: arillso/.github/.github/workflows/ai-claude-review.yml@2026-06-18
        secrets:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
