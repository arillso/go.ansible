---
name: Security

"on":
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

permissions:
    contents: read
    security-events: write

jobs:
    codeql:
        uses: arillso/.github/.github/workflows/security-codeql.yml@2026-03-09

    trivy:
        uses: arillso/.github/.github/workflows/security-trivy.yml@2026-03-09
